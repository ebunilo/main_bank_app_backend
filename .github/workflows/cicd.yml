name: Bank Backend Pipeline

on:
  push:
    branches:
      - main
  # pull_request:
  #   branches:
  #     - cicd

jobs:
  Continues-Integration_build_and_push:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 488850521901.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: bank-backendapi
      AWS_REGION: us-east-1
      IMAGE_TAG: ${{ github.run_number }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
        docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
  
    - name: Push Docker images to ECR
      run: |
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

    - name: Clean up Docker images locally
      if: always()
      run: |
        docker rmi ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} || true
        docker rmi ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest || true

  
  Continues-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continues-Integration_build_and_push
    steps:
    - name: Checkout manifest repository
      uses: actions/checkout@v4
      with:
          repository: Digital-Witch-Cloud-Computing-POD-14/kubernetes-manifest
          token: ${{secrets.GIT_PASSWORD}}
          path: kubernetes-manifest

    - name: Update manifest and push
      run: |
        cd kubernetes-manifest
        git config --global user.email "pod14everyone@gmail.com"
        git config --global user.name "pod14_project"

        # Debug: Let's see the file before we touch it
        cat bank-project/backendapi.yaml

        # Update the image tag - finding the 'image:' line is safer
        sed -i "s|image:.*|image: ${{vars.ECR_REPO}}:${{github.run_number}}|g" bank-project/backendapi.yaml

        # Verify the change
        grep "${{vars.ECR_REPO}}:${{github.run_number}}" bank-project/backendapi.yaml

        git add bank-project/backendapi.yaml
        git commit -m "Update backend image to version ${{github.run_number}}"
        git push origin main

        #h








